name: Update Jamie On-Call Calendar

on:
  schedule:
    - cron: '0 6 * * *'   # 6 AM UTC = calendar refresh
    - cron: '0 11 * * *'  # 11 AM UTC = 7 AM Eastern SMS check
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run calendar generator
        run: python generate.py

      - name: Ensure .nojekyll exists
        run: touch docs/.nojekyll

      - name: Commit updated ICS to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/jamie_oncall.ics docs/.nojekyll
          git diff --cached --quiet || git commit -m "Update Jamie on-call calendar [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send on-call text reminder
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          python - <<'EOF'
          import smtplib, os
          from datetime import date
          from email.mime.text import MIMEText

          today = date.today().strftime("%Y%m%d")

          with open("docs/jamie_oncall.ics") as f:
              content = f.read()

          if f"DTSTART;VALUE=DATE:{today}" in content:
              gmail_user = os.environ["GMAIL_USER"]
              gmail_pass = os.environ["GMAIL_PASSWORD"]
              to_email   = os.environ["NOTIFY_EMAIL"]

              msg = MIMEText("Reminder: Jamie is on call today!")
              msg["Subject"] = "Reminder: Jamie is on call today!"
              msg["From"]    = gmail_user
              msg["To"]      = to_email

              with smtplib.SMTP_SSL("smtp.gmail.com", 465) as smtp:
                  smtp.login(gmail_user, gmail_pass)
                  smtp.sendmail(gmail_user, to_email, msg.as_string())
              print("Text sent via email gateway")
          else:
              print("Jamie not on call today, no text sent.")
          EOF
