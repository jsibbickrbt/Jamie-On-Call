name: Bootstrap Secrets
on:
  workflow_dispatch:
    inputs:
      twilio_sid:
        description: 'Twilio Account SID'
        required: true
      twilio_token:
        description: 'Twilio Auth Token'
        required: true
      twilio_from:
        description: 'Twilio FROM number'
        required: true
      twilio_to:
        description: 'TO phone number'
        required: true
jobs:
  set-secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Set Twilio secrets via PyNaCl
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_SID: ${{ github.event.inputs.twilio_sid }}
          INPUT_TOKEN: ${{ github.event.inputs.twilio_token }}
          INPUT_FROM: ${{ github.event.inputs.twilio_from }}
          INPUT_TO: ${{ github.event.inputs.twilio_to }}
        run: |
          pip install PyNaCl requests -q
          python3 - <<'EOF'
import nacl.public, base64, requests, os

token = os.environ["GH_TOKEN"]
repo = "jsibbickrbt/Jamie-On-Call"
headers = {"Authorization": f"token {token}", "Accept": "application/vnd.github+json"}

r = requests.get(f"https://api.github.com/repos/{repo}/actions/secrets/public-key", headers=headers)
key_id = r.json()["key_id"]
pub_key = base64.b64decode(r.json()["key"])

def encrypt(secret):
    box = nacl.public.SealedBox(nacl.public.PublicKey(pub_key))
    return base64.b64encode(box.encrypt(secret.encode())).decode()

secrets = {
    "TWILIO_ACCOUNT_SID": os.environ["INPUT_SID"],
    "TWILIO_AUTH_TOKEN":  os.environ["INPUT_TOKEN"],
    "TWILIO_FROM":        os.environ["INPUT_FROM"],
    "TWILIO_TO":          os.environ["INPUT_TO"],
}

for name, value in secrets.items():
    payload = {"encrypted_value": encrypt(value), "key_id": key_id}
    r = requests.put(f"https://api.github.com/repos/{repo}/actions/secrets/{name}", json=payload, headers=headers)
    print(f"Set {name}: {r.status_code}")
EOF
